<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập – Vietnam - Korea Logistics</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%231e40af'/><text x='12' y='72' font-family='Arial Black,sans-serif' font-size='58' font-weight='900' fill='%23d42126'>V</text><text x='54' y='72' font-family='Arial Black,sans-serif' font-size='58' font-weight='900' fill='white'>H</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans KR', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(150deg, #1e40af 0%, #1e3a8a 45%, #1a1a2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* decorative circles */
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,33,38,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -80px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,33,38,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 36px 34px 32px;
      width: 100%;
      max-width: 390px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.28), 0 4px 16px rgba(0,0,0,0.12);
      position: relative;
      z-index: 1;
    }

    /* ── Brand ── */
    .brand {
      text-align: center;
      margin-bottom: 26px;
    }

    .brand-logo {
      height: 72px;
      width: auto;
      display: block;
      margin: 0 auto 10px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12));
    }

    .brand-name-login {
      font-size: 1.05rem;
      font-weight: 800;
      color: #1e3a8a;
      letter-spacing: -0.2px;
    }

    .brand-tagline {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-top: 3px;
    }

    /* divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
    .divider span {
      font-size: 0.72rem;
      color: #94a3b8;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    /* ── Lang switcher ── */
    .lang-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 22px;
    }
    .lang-btn {
      padding: 4px 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 99px;
      background: white;
      font-size: 0.74rem;
      font-weight: 600;
      cursor: pointer;
      color: #64748b;
      transition: all 0.15s;
    }
    .lang-btn.active, .lang-btn:hover {
      border-color: #d42126;
      color: #d42126;
      background: #fff1f1;
    }

    /* ── Form ── */
    h2 { font-size: 1.2rem; color: #0f172a; font-weight: 700; margin-bottom: 3px; }
    .form-subtitle { font-size: 0.8rem; color: #64748b; margin-bottom: 20px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 0.78rem; font-weight: 700; color: #475569; margin-bottom: 5px; }

    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%;
      padding: 10px 40px 10px 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #0f172a;
      background: #f8fafc;
      transition: all 0.15s;
      font-family: inherit;
    }
    .input-wrap input:focus {
      outline: none;
      border-color: #d42126;
      background: white;
      box-shadow: 0 0 0 3px rgba(212,33,38,0.1);
    }
    .input-icon {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); font-size: 0.95rem; pointer-events: none;
    }
    .toggle-pass {
      position: absolute; right: 11px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 0.95rem; color: #94a3b8; padding: 0;
    }
    .toggle-pass:hover { color: #475569; }

    .remember-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
    }
    .remember-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: #d42126; cursor: pointer; }
    .remember-row label { font-size: 0.8rem; color: #475569; cursor: pointer; }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #d42126 0%, #b91c22 100%);
      color: white;
      border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.3px;
      box-shadow: 0 3px 10px rgba(212,33,38,0.3);
    }
    .btn-login:hover  { opacity: 0.92; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      display: none; margin-top: 13px;
      padding: 9px 13px;
      background: #fff1f1; border: 1px solid #fecaca; border-radius: 8px;
      font-size: 0.8rem; color: #b91c1c; text-align: center;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1s steps(4, end) infinite;
    }
    @keyframes dots {
      0%,20%{content:''} 40%{content:'.'} 60%{content:'..'} 80%,100%{content:'...'}
    }

    .footer-note { text-align: center; margin-top: 18px; font-size: 0.72rem; color: #94a3b8; line-height: 1.8; }
    .tf-brand-login {
      font-weight: 800; letter-spacing: 0.5px; font-size: 0.82rem;
      background: linear-gradient(135deg, #d42126, #1e40af);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Đăng ký / dùng thử */
    .reg-line { text-align:center; margin-top:16px; font-size:0.85rem; color:#64748b; }
    .reg-line a { color:#d42126; font-weight:700; text-decoration:none; }
    .reg-line a:hover { text-decoration:underline; }
    .try-line { text-align:center; margin-top:6px; font-size:0.83rem; }
    .try-line a { color:#1e40af; font-weight:600; text-decoration:none; }
    .try-line a:hover { text-decoration:underline; }

    /* Modal đăng ký */
    .reg-modal {
      position:fixed; inset:0; background:rgba(15,23,42,0.6);
      display:flex; align-items:center; justify-content:center; padding:20px; z-index:1000;
    }
    .reg-card {
      position:relative; background:#fff; border-radius:16px; padding:30px 28px 26px;
      max-width:440px; width:100%; box-shadow:0 24px 64px rgba(0,0,0,0.3);
      max-height:92vh; overflow-y:auto;
    }
    .reg-x { position:absolute; top:12px; right:14px; background:none; border:none; font-size:1.6rem; color:#94a3b8; cursor:pointer; line-height:1; }
    .reg-x:hover { color:#475569; }
    .reg-ic { font-size:2.2rem; text-align:center; margin-bottom:8px; }
    .reg-card h3 { font-size:1.25rem; color:#0f172a; text-align:center; margin-bottom:8px; font-weight:800; }
    .reg-pitch { font-size:0.92rem; color:#475569; text-align:center; line-height:1.6; margin-bottom:16px; }
    .reg-benefits { list-style:none; margin:0 0 16px; padding:0; }
    .reg-benefits li { font-size:0.9rem; color:#334155; padding:7px 0 7px 26px; position:relative; line-height:1.5; border-bottom:1px solid #f1f5f9; }
    .reg-benefits li:last-child { border-bottom:none; }
    .reg-benefits li::before { content:'✓'; position:absolute; left:0; top:7px; color:#059669; font-weight:800; }
    .reg-how-box { background:#eff6ff; border:1px solid #bfdbfe; border-radius:10px; padding:12px 14px; margin-bottom:16px; }
    .reg-how { font-size:0.86rem; color:#1e40af; line-height:1.6; margin:0; }
    .reg-mail-btn {
      display:block; text-align:center; padding:13px; border-radius:10px;
      background:linear-gradient(135deg,#d42126,#1e40af); color:#fff;
      font-weight:700; font-size:0.95rem; text-decoration:none; box-shadow:0 4px 12px rgba(212,33,38,0.25);
    }
    .reg-mail-btn:hover { opacity:0.92; }
    .reg-actions { display:flex; gap:8px; margin-top:10px; }
    .reg-ghost { flex:1; text-align:center; padding:10px; border-radius:10px; border:1.5px solid #e2e8f0; background:#fff; color:#475569; font-weight:600; font-size:0.84rem; text-decoration:none; }
    .reg-ghost:hover { border-color:#cbd5e1; background:#f8fafc; }
    .footer-note strong { color: #64748b; }
  </style>
</head>
<body>
<div class="card">

  <div class="brand">
    <img src="/logo.png" alt="Vietnam - Korea Logistics" class="brand-logo" />
    <div class="brand-name-login" id="brandNameLogin">Vietnam - Korea Logistics</div>
    <div class="brand-tagline" id="brandTagline">Tra Mã Bưu Điện Hàn Quốc</div>
  </div>

  <div class="lang-row">
    <button class="lang-btn active" onclick="setLang('vi')" id="lgVI">Tiếng Việt</button>
    <button class="lang-btn" onclick="setLang('en')" id="lgEN">Tiếng Anh</button>
    <button class="lang-btn" onclick="setLang('ko')" id="lgKO">Tiếng Hàn</button>
  </div>

  <h2 id="heading">Đăng nhập</h2>
  <p class="form-subtitle" id="subheading">Vui lòng đăng nhập để tiếp tục</p>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label id="labelUser">Tên đăng nhập</label>
      <div class="input-wrap">
        <input type="text" id="username" autocomplete="username" required />
        <span class="input-icon">👤</span>
      </div>
    </div>

    <div class="field">
      <label id="labelPass">Mật khẩu</label>
      <div class="input-wrap">
        <input type="password" id="password" autocomplete="current-password" required />
        <button type="button" class="toggle-pass" id="togglePass" onclick="togglePassword()">👁</button>
      </div>
    </div>

    <div class="remember-row">
      <input type="checkbox" id="remember" />
      <label for="remember" id="labelRemember">Ghi nhớ đăng nhập (30 ngày)</label>
    </div>

    <button type="submit" class="btn-login" id="submitBtn">
      <span id="btnText">Đăng nhập</span>
    </button>
  </form>

  <div class="error-msg" id="errorMsg"></div>

  <p class="reg-line">
    <span id="regQ">Chưa có tài khoản?</span>
    <a href="#" id="regLink" onclick="openRegister(); return false;">Đăng ký</a>
  </p>
  <p class="try-line"><a href="/" id="tryFreeLink">Hoặc dùng thử miễn phí ngay →</a></p>

  <div class="footer-note">
    <span class="tf-brand-login">Transflash</span><br>
    <strong>logistics.transflash.app</strong>
  </div>
</div>

<!-- Modal đăng ký -->
<div class="reg-modal" id="regModal" style="display:none">
  <div class="reg-card">
    <button class="reg-x" onclick="closeRegister()" aria-label="close">×</button>
    <div class="reg-ic">🚀</div>
    <h3 id="regTitle">Đăng ký sử dụng</h3>
    <p class="reg-pitch" id="regPitch"></p>
    <ul class="reg-benefits" id="regBenefits"></ul>
    <div class="reg-how-box"><p class="reg-how" id="regHow"></p></div>
    <a class="reg-mail-btn" id="regMailBtn" href="#"></a>
    <div class="reg-actions">
      <a class="reg-ghost" id="regTryBtn" href="/"></a>
      <a class="reg-ghost" id="regMoreBtn" href="/about"></a>
    </div>
  </div>
</div>

<script>
const T = {
  vi: {
    tagline: 'Tra Mã Bưu Điện Hàn Quốc',
    langVI: 'Tiếng Việt', langEN: 'Tiếng Anh', langKO: 'Tiếng Hàn',
    heading: 'Đăng nhập', subheading: 'Vui lòng đăng nhập để tiếp tục',
    labelUser: 'Tên đăng nhập', labelPass: 'Mật khẩu',
    labelRemember: 'Ghi nhớ đăng nhập (30 ngày)',
    btnText: 'Đăng nhập', btnLoading: 'Đang đăng nhập',
    errWrong: 'Tên đăng nhập hoặc mật khẩu không đúng.',
    errNetwork: 'Lỗi kết nối. Vui lòng thử lại.',
    regQ: 'Chưa có tài khoản?', regLink: 'Đăng ký',
    tryFree: 'Hoặc dùng thử miễn phí ngay →',
    regTitle: 'Đăng ký sử dụng',
    regPitch: 'Bộ công cụ logistics Việt - Hàn: tra mã bưu điện Hàn Quốc và tra tiến trình thông quan hàng nhập (UNI-PASS) cho hàng nghìn vận đơn — thay vì tra tay hàng giờ mỗi ngày.',
    regBenefits: [
      'Tra mã bưu điện hàng loạt qua Excel (khách chỉ tối đa 5 địa chỉ/file)',
      'Tra thông quan UNI-PASS theo lô — quét cả danh sách kho một lần',
      'Dữ liệu chính phủ Hàn Quốc (도로명주소) & Hải quan (UNI-PASS) — chính xác',
      'Tiết kiệm ~100 triệu₫/năm so với thuê nhân viên nhập liệu',
    ],
    regHow: 'Để đăng ký, gửi email tới support@transflash.app kèm: tên công ty, người liên hệ, số điện thoại và số địa chỉ cần tra mỗi ngày. Chúng tôi sẽ tạo tài khoản và phản hồi trong vòng 24 giờ.',
    regMailSubject: 'Đăng ký tài khoản - Postcode Transflash',
    regMailBody: 'Xin chào Transflash,\n\nTôi muốn đăng ký sử dụng phần mềm tra mã bưu điện Hàn Quốc.\n\nTên công ty: \nNgười liên hệ: \nSố điện thoại: \nSố địa chỉ cần tra mỗi ngày: \n\nVui lòng tư vấn giúp tôi. Cảm ơn!',
    regMailBtn: 'Gửi email đăng ký',
    regTryBtn: 'Dùng thử miễn phí',
    regMoreBtn: 'Tìm hiểu thêm',
  },
  en: {
    tagline: 'Korean Postal Code Lookup',
    langVI: 'Vietnamese', langEN: 'English', langKO: 'Korean',
    heading: 'Sign In', subheading: 'Please sign in to continue',
    labelUser: 'Username', labelPass: 'Password',
    labelRemember: 'Remember me (30 days)',
    btnText: 'Sign In', btnLoading: 'Signing in',
    errWrong: 'Incorrect username or password.',
    errNetwork: 'Connection error. Please try again.',
    regQ: "Don't have an account?", regLink: 'Register',
    tryFree: 'Or try it free now →',
    regTitle: 'Register to use',
    regPitch: 'A Vietnam - Korea logistics toolkit: Korean postal code lookup and import customs clearance tracking (UNI-PASS) for thousands of shipments — instead of hours of manual work every day.',
    regBenefits: [
      'Bulk postal code lookup via Excel (guests: max 5 addresses per file)',
      'Batch UNI-PASS customs tracking — scan a whole warehouse list at once',
      'Official Korean data (도로명주소) & Customs (UNI-PASS) — accurate',
      'Save ~100M₫/year vs. hiring a data-entry staff',
    ],
    regHow: 'To register, email support@transflash.app with: company name, contact person, phone number, and how many addresses you process daily. We will create your account and reply within 24 hours.',
    regMailSubject: 'Account registration - Postcode Transflash',
    regMailBody: 'Hello Transflash,\n\nI would like to register for the Korean postal code lookup software.\n\nCompany name: \nContact person: \nPhone number: \nAddresses processed per day: \n\nPlease advise. Thank you!',
    regMailBtn: 'Send registration email',
    regTryBtn: 'Try it free',
    regMoreBtn: 'Learn more',
  },
  ko: {
    tagline: '한국 우편번호 조회',
    langVI: '베트남어', langEN: '영어', langKO: '한국어',
    heading: '로그인', subheading: '계속하려면 로그인하세요',
    labelUser: '사용자 이름', labelPass: '비밀번호',
    labelRemember: '로그인 유지 (30일)',
    btnText: '로그인', btnLoading: '로그인 중',
    errWrong: '사용자 이름 또는 비밀번호가 올바르지 않습니다.',
    errNetwork: '연결 오류. 다시 시도해주세요.',
    regQ: '계정이 없으신가요?', regLink: '가입 신청',
    tryFree: '또는 무료로 바로 체험하기 →',
    regTitle: '이용 신청',
    regPitch: '베트남-한국 물류 도구 모음: 한국 우편번호 조회와 수입 통관 진행정보(UNI-PASS) 조회 — 매일 수작업하는 대신 수천 건을 한 번에.',
    regBenefits: [
      '엑셀로 우편번호 일괄 조회 (게스트는 파일당 최대 5개)',
      'UNI-PASS 통관 일괄 조회 — 창고 리스트 전체를 한 번에',
      '한국 정부 데이터(도로명주소) & 관세청(UNI-PASS) — 정확',
      '데이터 입력 직원 대비 연 약 1억동 절약',
    ],
    regHow: '신청하려면 support@transflash.app 으로 회사명, 담당자, 전화번호, 하루 처리 주소 수를 보내주세요. 24시간 이내에 계정을 생성하여 회신드립니다.',
    regMailSubject: '계정 신청 - Postcode Transflash',
    regMailBody: '안녕하세요 Transflash,\n\n한국 우편번호 조회 소프트웨어 이용을 신청합니다.\n\n회사명: \n담당자: \n전화번호: \n하루 처리 주소 수: \n\n안내 부탁드립니다. 감사합니다!',
    regMailBtn: '신청 이메일 보내기',
    regTryBtn: '무료 체험',
    regMoreBtn: '더 알아보기',
  }
};

let lang = localStorage.getItem('lang') || 'vi';

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('onclick').includes(`'${l}'`))
  );
  const d = T[l];
  document.getElementById('brandTagline').textContent  = d.tagline;
  document.getElementById('lgVI').textContent          = d.langVI;
  document.getElementById('lgEN').textContent          = d.langEN;
  document.getElementById('lgKO').textContent          = d.langKO;
  document.getElementById('heading').textContent       = d.heading;
  document.getElementById('subheading').textContent    = d.subheading;
  document.getElementById('labelUser').textContent     = d.labelUser;
  document.getElementById('labelPass').textContent     = d.labelPass;
  document.getElementById('labelRemember').textContent = d.labelRemember;
  document.getElementById('btnText').textContent       = d.btnText;
  document.getElementById('regQ').textContent          = d.regQ;
  document.getElementById('regLink').textContent       = d.regLink;
  document.getElementById('tryFreeLink').textContent   = d.tryFree;
  document.getElementById('errorMsg').style.display    = 'none';
  document.title = `${d.heading} – Vietnam - Korea Logistics`;
}

function openRegister() {
  const d = T[lang];
  document.getElementById('regTitle').textContent   = d.regTitle;
  document.getElementById('regPitch').textContent   = d.regPitch;
  document.getElementById('regBenefits').innerHTML  = d.regBenefits.map(b => `<li>${b}</li>`).join('');
  document.getElementById('regHow').textContent     = d.regHow;
  const mail = `mailto:support@transflash.app?subject=${encodeURIComponent(d.regMailSubject)}&body=${encodeURIComponent(d.regMailBody)}`;
  const btn = document.getElementById('regMailBtn');
  btn.href = mail;
  btn.textContent = '📧 ' + d.regMailBtn;
  document.getElementById('regTryBtn').textContent  = d.regTryBtn;
  document.getElementById('regMoreBtn').textContent = d.regMoreBtn;
  document.getElementById('regModal').style.display = 'flex';
}
function closeRegister() { document.getElementById('regModal').style.display = 'none'; }

function togglePassword() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('togglePass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn   = document.getElementById('submitBtn');
  const errEl = document.getElementById('errorMsg');
  const d     = T[lang];

  btn.disabled = true;
  document.getElementById('btnText').className = 'loading-dots';
  document.getElementById('btnText').textContent = d.btnLoading;
  errEl.style.display = 'none';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
        remember: String(document.getElementById('remember').checked),
      }),
    });
    if (res.ok) {
      window.location.href = '/';
    } else {
      errEl.textContent = d.errWrong;
      errEl.style.display = 'block';
      btn.disabled = false;
      document.getElementById('btnText').className = '';
      document.getElementById('btnText').textContent = d.btnText;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch {
    errEl.textContent = d.errNetwork;
    errEl.style.display = 'block';
    btn.disabled = false;
    document.getElementById('btnText').className = '';
    document.getElementById('btnText').textContent = d.btnText;
  }
}

setLang(lang);
</script>
</body>
</html>
