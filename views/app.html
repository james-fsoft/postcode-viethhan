<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Việt Hàn Logistics – Tra Mã Bưu Điện</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%231e40af'/><text x='12' y='72' font-family='Arial Black,sans-serif' font-size='58' font-weight='900' fill='%23d42126'>V</text><text x='54' y='72' font-family='Arial Black,sans-serif' font-size='58' font-weight='900' fill='white'>H</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --red:        #d42126;
      --red-dark:   #b91c22;
      --red-light:  #fff1f1;
      --blue:       #1e40af;
      --blue-mid:   #1d4ed8;
      --blue-light: #eff6ff;
      --zip-color:  #1e40af;
      --gray-50:  #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-900: #0f172a;
      --radius: 8px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans KR', Arial, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      padding: 20px 16px 48px;
      color: var(--gray-700);
    }

    .container { max-width: 920px; margin: 0 auto; }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-area img {
      height: 44px;
      width: auto;
      display: block;
    }

    .brand-text { line-height: 1.2; }

    .brand-text .brand-name {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .brand-text .brand-name .vh-red  { color: var(--red); }
    .brand-text .brand-name .vh-blue { color: var(--blue); }

    .brand-text .brand-sub {
      font-size: 0.72rem;
      color: var(--gray-400);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .lang-switcher { display: flex; gap: 5px; }

    .lang-btn {
      padding: 4px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 99px;
      background: white;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--gray-500);
      transition: all 0.15s;
    }
    .lang-btn.active, .lang-btn:hover {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-light);
    }

    .btn-logout {
      padding: 4px 14px;
      border: 1.5px solid #fecaca;
      border-radius: 99px;
      background: white;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--red);
      transition: all 0.15s;
    }
    .btn-logout:hover { background: var(--red-light); }

    /* ── API Key ── */
    .api-box {
      background: white;
      border-radius: var(--radius);
      padding: 13px 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      border-left: 3px solid var(--red);
    }
    .api-box label { font-size: 0.8rem; font-weight: 700; color: var(--gray-600); white-space: nowrap; }
    .api-box input {
      flex: 1; min-width: 200px;
      padding: 7px 11px;
      border: 1.5px solid var(--gray-200);
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: monospace;
      background: var(--gray-50);
    }
    .api-box input:focus { outline: none; border-color: var(--blue); background: white; }
    .api-box a { font-size: 0.78rem; color: var(--blue); text-decoration: none; white-space: nowrap; }
    .api-box a:hover { text-decoration: underline; }

    /* ── Tabs ── */
    .tabs { display: flex; border-bottom: 2px solid var(--gray-200); }

    .tab-btn {
      padding: 10px 22px;
      border: none; background: transparent;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; color: var(--gray-400);
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all 0.15s;
    }
    .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }
    .tab-btn:hover:not(.active) { color: var(--gray-600); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Card ── */
    .card {
      background: white; border-radius: var(--radius);
      padding: 20px; box-shadow: var(--shadow); margin-top: 14px;
    }
    .card label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--gray-600); margin-bottom: 7px; }

    textarea {
      width: 100%; height: 185px;
      padding: 10px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 6px; font-size: 0.87rem;
      resize: vertical; line-height: 1.7; font-family: inherit;
      background: var(--gray-50);
    }
    textarea:focus { outline: none; border-color: var(--blue); background: white; }

    .hint { font-size: 0.76rem; color: var(--gray-400); margin-top: 6px; line-height: 1.5; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }

    .btn {
      padding: 8px 18px; border: none; border-radius: 6px;
      font-size: 0.86rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--red); color: white; }
    .btn-primary:hover { background: var(--red-dark); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200); }
    .btn-ghost:hover { background: var(--gray-200); }
    .btn-green { background: #059669; color: white; }
    .btn-green:hover { background: #047857; }
    .btn-green:disabled { opacity: 0.4; cursor: not-allowed; }
    .ml-auto { margin-left: auto; }

    /* ── Progress ── */
    .progress-bar-wrap {
      display: none; margin-top: 12px;
      background: var(--gray-100); border-radius: 99px; height: 6px; overflow: hidden;
    }
    .progress-bar-fill { height: 100%; background: var(--red); border-radius: 99px; transition: width 0.2s; width: 0%; }
    .progress-label { display: none; font-size: 0.78rem; color: var(--gray-400); margin-top: 4px; text-align: right; }

    /* ── Results ── */
    .results-box { margin-top: 14px; display: none; }
    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 10px;
    }
    .results-header .summary { font-size: 0.85rem; color: var(--gray-600); font-weight: 600; }
    .table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }

    table { width: 100%; border-collapse: collapse; background: white; font-size: 0.86rem; }
    th {
      background: var(--gray-50); padding: 9px 13px;
      text-align: left; font-size: 0.74rem; color: var(--gray-500);
      font-weight: 700; border-bottom: 1.5px solid var(--gray-200); white-space: nowrap;
    }
    td { padding: 10px 13px; border-bottom: 1px solid var(--gray-100); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }

    .zip-found { font-weight: 700; color: var(--blue); font-family: monospace; font-size: 1rem; }
    .zip-error { color: var(--red); font-size: 0.78rem; }

    .badge { display: inline-block; padding: 2px 7px; border-radius: 99px; font-size: 0.68rem; font-weight: 700; }
    .badge-road  { background: #eff6ff; color: var(--blue); }
    .badge-jibun { background: #fffbeb; color: #92400e; }
    .badge-error { background: var(--red-light); color: var(--red); }

    /* ── Upload ── */
    .upload-area {
      border: 2px dashed var(--gray-200); border-radius: var(--radius);
      padding: 30px 20px; text-align: center; cursor: pointer;
      transition: all 0.15s; background: var(--gray-50);
    }
    .upload-area:hover, .upload-area.drag-over { border-color: var(--red); background: var(--red-light); }
    .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-area p { font-size: 0.86rem; color: var(--gray-500); }
    .upload-area strong { color: var(--red); }
    #fileInput { display: none; }

    .file-info {
      display: none; align-items: center; gap: 10px;
      padding: 9px 13px; background: #f0fdf4;
      border: 1px solid #86efac; border-radius: 6px; margin-top: 10px; font-size: 0.86rem;
    }
    .file-info .file-name { font-weight: 600; color: var(--gray-700); }
    .file-info .file-size { color: var(--gray-400); font-size: 0.76rem; }

    .col-select-row {
      display: none; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap;
    }
    .col-select-row label { font-size: 0.8rem; font-weight: 700; color: var(--gray-600); }
    .col-select-row select {
      padding: 6px 10px; border: 1.5px solid var(--gray-200);
      border-radius: 6px; font-size: 0.86rem; background: white;
    }
    .col-select-row select:focus { outline: none; border-color: var(--blue); }

    .preview-table-wrap {
      display: none; margin-top: 12px; max-height: 180px;
      overflow: auto; border-radius: 6px; border: 1px solid var(--gray-200);
    }
    .preview-table-wrap table { font-size: 0.78rem; }
    .preview-table-wrap th { font-size: 0.7rem; }
    .preview-table-wrap td { padding: 5px 9px; }
    .preview-table-wrap th.hl, .preview-table-wrap td.hl { background: #eff6ff; color: var(--blue); font-weight: 600; }

    .error-banner {
      padding: 9px 13px; background: var(--red-light);
      border: 1px solid #fecaca; border-radius: 6px;
      font-size: 0.82rem; color: var(--red); margin-top: 10px; display: none;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Top bar -->
  <div class="topbar">
    <div class="brand-area">
      <img src="/logo.png" alt="Việt Hàn Logistics" />
      <div class="brand-text">
        <div class="brand-name">
          <span class="vh-red">VIỆT HÀN</span>&nbsp;<span class="vh-blue">LOGISTICS</span>
        </div>
        <div class="brand-sub" data-i18n="brandSub">Tra Mã Bưu Điện Hàn Quốc</div>
      </div>
    </div>

    <div class="topbar-right">
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('vi')">Tiếng Việt</button>
        <button class="lang-btn" onclick="setLang('en')">English</button>
        <button class="lang-btn" onclick="setLang('ko')">한국어</button>
      </div>
      <button class="btn-logout" onclick="logout()" data-i18n="btnLogout">Đăng xuất</button>
    </div>
  </div>

  <!-- API Key -->
  <div class="api-box">
    <label data-i18n="apiKeyLabel">Kakao REST API Key</label>
    <input type="text" id="apiKey" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
    <a href="https://www.juso.go.kr/addrlink/devAddrLinkRequestWrite.do" target="_blank" data-i18n="getKey">Lấy key miễn phí →</a>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="manual" data-i18n="tabManual" onclick="switchTab('manual')">Tìm kiếm thủ công</button>
    <button class="tab-btn" data-tab="excel" data-i18n="tabExcel" onclick="switchTab('excel')">Upload Excel</button>
  </div>

  <!-- ══ TAB 1: Manual ══ -->
  <div class="tab-panel active" id="tab-manual">
    <div class="card">
      <label data-i18n="manualLabel">Danh sách địa chỉ (mỗi dòng 1 địa chỉ)</label>
      <textarea id="addressInput" data-i18n-placeholder="manualPlaceholder"></textarea>
      <p class="hint" data-i18n="manualHint">Gợi ý: bỏ số phòng / tên tòa nhà sẽ cho kết quả chính xác hơn.</p>
      <div class="btn-row">
        <button class="btn btn-primary" id="searchBtn" onclick="runManualSearch()" data-i18n="btnSearch">Tra cứu</button>
        <button class="btn btn-ghost" onclick="clearManual()" data-i18n="btnClear">Xóa</button>
        <button class="btn btn-ghost ml-auto" onclick="loadSample()" data-i18n="btnSample">Tải địa chỉ mẫu</button>
      </div>
      <div class="progress-bar-wrap" id="manualProgressWrap"><div class="progress-bar-fill" id="manualProgressFill"></div></div>
      <div class="progress-label" id="manualProgressLabel"></div>
    </div>

    <div class="results-box" id="manualResults">
      <div class="results-header">
        <span class="summary" id="manualSummary"></span>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost" id="copyBtn" onclick="copyManualResults()" data-i18n="btnCopy">Sao chép</button>
          <button class="btn btn-green" onclick="downloadManualExcel()" data-i18n="btnDownloadResult">Tải .xlsx</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th data-i18n="colZip">Mã bưu điện</th>
              <th data-i18n="colInput">Địa chỉ nhập</th>
              <th data-i18n="colNormalized">Địa chỉ chuẩn hóa</th>
              <th data-i18n="colType">Loại</th>
            </tr>
          </thead>
          <tbody id="manualBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ══ TAB 2: Excel ══ -->
  <div class="tab-panel" id="tab-excel">
    <div class="card">
      <label data-i18n="excelUploadLabel">Tải lên file Excel</label>
      <div class="upload-area" id="uploadArea"
           onclick="document.getElementById('fileInput').click()"
           ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <div class="upload-icon">📂</div>
        <p><strong data-i18n="uploadClick">Nhấp để chọn file</strong> <span data-i18n="uploadDrag">hoặc kéo thả vào đây</span></p>
        <p style="margin-top:5px;font-size:0.75rem;" data-i18n="uploadFormats">Hỗ trợ: .xlsx, .xls, .csv</p>
      </div>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" onchange="onFileSelected(event)" />

      <div class="file-info" id="fileInfo">
        <span>📄</span>
        <span class="file-name" id="fileName"></span>
        <span class="file-size" id="fileSize"></span>
        <button class="btn btn-ghost" style="margin-left:auto;padding:4px 11px;font-size:0.76rem;" onclick="resetFile()" data-i18n="btnRemove">Xóa file</button>
      </div>

      <div class="col-select-row" id="colSelectRow">
        <label data-i18n="colSelectLabel">Cột địa chỉ:</label>
        <select id="colSelect" onchange="updatePreview()"></select>
        <label data-i18n="headerRowLabel">Tiêu đề:</label>
        <select id="headerRowSelect" onchange="onHeaderRowChange()">
          <option value="1">Hàng 1</option>
          <option value="0" data-i18n-option="noHeader">Không có</option>
        </select>
      </div>

      <div class="preview-table-wrap" id="previewWrap"></div>
      <div class="error-banner" id="uploadError"></div>

      <div class="btn-row" style="margin-top:12px;">
        <button class="btn btn-primary" id="excelSearchBtn" onclick="runExcelSearch()" disabled data-i18n="btnProcess">Tra cứu mã bưu điện</button>
        <button class="btn btn-ghost" onclick="resetFile()" data-i18n="btnClear">Xóa</button>
      </div>
      <div class="progress-bar-wrap" id="excelProgressWrap"><div class="progress-bar-fill" id="excelProgressFill"></div></div>
      <div class="progress-label" id="excelProgressLabel"></div>
    </div>

    <div class="results-box" id="excelResults">
      <div class="results-header">
        <span class="summary" id="excelSummary"></span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-ghost" onclick="downloadOriginal()" data-i18n="btnDownloadOriginal">Tải file gốc</button>
          <button class="btn btn-green" onclick="downloadExcelResult()" data-i18n="btnDownloadResult">Tải file kết quả</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="excelResultHead"></thead>
          <tbody id="excelResultBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

let currentLang = 'vi';
function t(key, ...args) {
  const val = LANGS[currentLang][key];
  return typeof val === 'function' ? val(...args) : (val || key);
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('onclick').includes(`'${lang}'`))
  );
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = LANGS[lang][el.dataset.i18n];
    if (v && typeof v !== 'function') el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const v = LANGS[lang][el.dataset.i18nPlaceholder];
    if (v) el.placeholder = v;
  });
  const nh = document.querySelector('[data-i18n-option="noHeader"]');
  if (nh) nh.textContent = t('noHeader');
  document.title = `Việt Hàn Logistics – ${t('brandSub')}`;
  updatePreview();
}

function cleanAddress(addr) {
  return addr
    .replace(/^\(\d{5}\)\s*/, '')
    .replace(/\s*(빌라?|오피스텔|아파트|빌딩|타워|카이저빌|태경빌|율곡원룸|드림오피스텔|시티\d*|파레스|조은마을|그린오피스텔|국제교육원\s*기숙사)\s*/g, ' ')
    .replace(/\s*\d+[동층]\s*\d*호?\s*/g, ' ')
    .replace(/\s*\d+호\s*/g, ' ')
    .replace(/\s*\([^)]*\)\s*/g, ' ')
    .replace(/,\s*/g, ' ')
    .replace(/\s+/g, ' ').trim();
}

async function kakaoLookup(rawAddr, apiKey) {
  const cleaned = cleanAddress(rawAddr);
  const headers = {};
  if (apiKey) headers['x-juso-key'] = apiKey;

  const r = await fetch(`/api/juso?q=${encodeURIComponent(cleaned)}`, { headers });
  if (r.status === 401) throw new Error('AUTH');

  const data = await r.json();
  const code = data.results?.common?.errorCode;

  if (code === 'E0001' || code === 'E0005') throw new Error('INVALID_KEY');

  const list = data.results?.juso;
  if (list?.length > 0) {
    return { zip: list[0].zipNo, display: list[0].roadAddr, type: 'road' };
  }
  return { zip: null, display: null, type: 'not_found' };
}

async function batchLookup(addresses, apiKey, onProgress) {
  const results = [];
  for (let i = 0; i < addresses.length; i++) {
    onProgress(i + 1, addresses.length);
    try {
      results.push({ original: addresses[i], ...await kakaoLookup(addresses[i], apiKey) });
    } catch (e) {
      if (e.message === 'AUTH' || e.message === 'INVALID_KEY') {
        results.push({ original: addresses[i], zip: null, display: null, type: 'auth_error' });
        for (let j = i + 1; j < addresses.length; j++)
          results.push({ original: addresses[j], zip: null, display: null, type: 'auth_error' });
        return { results, authError: true };
      }
      results.push({ original: addresses[i], zip: null, display: null, type: 'error' });
    }
    if (i < addresses.length - 1) await new Promise(r => setTimeout(r, 110));
  }
  return { results, authError: false };
}

// ── Manual ────────────────────────────────────────────────────────────────────
let manualRows = [];
function loadSample() { document.getElementById('addressInput').value = SAMPLE; }
function clearManual() {
  document.getElementById('addressInput').value = '';
  document.getElementById('manualResults').style.display = 'none';
  manualRows = [];
}

async function runManualSearch() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const raw    = document.getElementById('addressInput').value.trim();
  if (!apiKey) { alert(t('errNoApiKey')); return; }
  if (!raw)    { alert(t('errNoAddress')); return; }
  const addresses = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const btn  = document.getElementById('searchBtn');
  const wrap = document.getElementById('manualProgressWrap');
  const fill = document.getElementById('manualProgressFill');
  const lbl  = document.getElementById('manualProgressLabel');
  btn.disabled = true; wrap.style.display = 'block'; lbl.style.display = 'block';
  document.getElementById('manualResults').style.display = 'none';
  const { results, authError } = await batchLookup(addresses, apiKey, (i, total) => {
    fill.style.width = `${Math.round(i/total*100)}%`;
    lbl.textContent  = t('progressText', i, total);
  });
  btn.disabled = false; wrap.style.display = 'none'; lbl.style.display = 'none';
  if (authError) alert(t('errInvalidKey'));
  manualRows = results;
  renderManualResults(results);
}

function renderManualResults(rows) {
  const tbody = document.getElementById('manualBody');
  tbody.innerHTML = '';
  rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${i+1}</td>
      <td>${r.zip ? `<span class="zip-found">${r.zip}</span>` : `<span class="zip-error">${t('errNotFound')}</span>`}</td>
      <td>${esc(r.original)}</td><td>${r.display ? esc(r.display) : '—'}</td>
      <td>${typeBadge(r.type)}</td>`;
    tbody.appendChild(tr);
  });
  const found = rows.filter(r => r.zip).length;
  document.getElementById('manualSummary').textContent = t('summaryFound', found, rows.length);
  document.getElementById('manualResults').style.display = 'block';
}

function copyManualResults() {
  const lines = manualRows.map(r => `${r.zip||t('errNotFound')}\t${r.original}\t${r.display||''}`);
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const b = document.getElementById('copyBtn');
    const orig = b.textContent;
    b.textContent = t('copied');
    setTimeout(() => { b.textContent = orig; }, 1500);
  });
}

function downloadManualExcel() {
  if (!manualRows.length) return;
  const ws_data = [[t('colInput'), t('colZipResult'), t('colNormalized'), t('colType')]];
  manualRows.forEach(r => ws_data.push([r.original, r.zip||'', r.display||'', typeLabel(r.type)]));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ws_data), '우편번호');
  XLSX.writeFile(wb, 'VietHan_postal_codes.xlsx');
}

// ── Excel tab ─────────────────────────────────────────────────────────────────
let uploadedFile = null, workbookData = [], excelRows = [];

function onDragOver(e)  { e.preventDefault(); document.getElementById('uploadArea').classList.add('drag-over'); }
function onDragLeave(e) { document.getElementById('uploadArea').classList.remove('drag-over'); }
function onDrop(e) { e.preventDefault(); document.getElementById('uploadArea').classList.remove('drag-over'); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); }
function onFileSelected(e) { if(e.target.files[0]) processFile(e.target.files[0]); }

function processFile(file) {
  uploadedFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = formatBytes(file.size);
  document.getElementById('fileInfo').style.display = 'flex';
  document.getElementById('uploadError').style.display = 'none';
  document.getElementById('excelResults').style.display = 'none';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      workbookData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
      if (!workbookData.length) throw new Error('Empty file');
      populateColSelect();
      document.getElementById('excelSearchBtn').disabled = false;
    } catch(err) { showUploadError('파일 읽기 오류: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function resetFile() {
  uploadedFile = null; workbookData = [];
  ['fileInfo','colSelectRow','previewWrap','excelResults','uploadError'].forEach(id =>
    document.getElementById(id).style.display = 'none');
  document.getElementById('excelSearchBtn').disabled = true;
  document.getElementById('fileInput').value = '';
}

function populateColSelect() {
  const hasHeader = parseInt(document.getElementById('headerRowSelect').value) > 0;
  const sel = document.getElementById('colSelect');
  sel.innerHTML = '';
  (workbookData[0]||[]).forEach((h, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${colLetter(i)}: ${hasHeader ? String(h||`열${i+1}`) : `열${i+1}`}`;
    sel.appendChild(opt);
  });
  let best = 0;
  (workbookData[0]||[]).forEach((h,i) => { if (['주소','address','addr'].some(k => String(h).toLowerCase().includes(k))) best=i; });
  if (best===0) { (workbookData[hasHeader?1:0]||[]).forEach((v,i) => { if(typeof v==='string' && /[시구동읍면로길]/.test(v)) best=i; }); }
  sel.value = best;
  document.getElementById('colSelectRow').style.display = 'flex';
  updatePreview();
}

function onHeaderRowChange() { if(workbookData.length) populateColSelect(); }

function updatePreview() {
  if (!workbookData.length) return;
  const col = parseInt(document.getElementById('colSelect').value)||0;
  const hasH = parseInt(document.getElementById('headerRowSelect').value)>0;
  let html = '<table><thead><tr>';
  (workbookData[0]||[]).forEach((h,i) => { html += `<th${i===col?' class="hl"':''}>${esc(hasH?String(h):colLetter(i))}</th>`; });
  html += '</tr></thead><tbody>';
  workbookData.slice(hasH?1:0, (hasH?1:0)+5).forEach(row => {
    html += '<tr>';
    row.forEach((cell,i) => { html += `<td${i===col?' class="hl"':''}>${esc(String(cell))}</td>`; });
    html += '</tr>';
  });
  const wrap = document.getElementById('previewWrap');
  wrap.innerHTML = html+'</tbody></table>';
  wrap.style.display = 'block';
}

async function runExcelSearch() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert(t('errNoApiKey')); return; }
  if (!workbookData.length) { alert(t('errNoFile')); return; }
  const col     = parseInt(document.getElementById('colSelect').value)||0;
  const hasH    = parseInt(document.getElementById('headerRowSelect').value)>0;
  const dataRows = workbookData.slice(hasH?1:0);
  const addresses = dataRows.map(row => String(row[col]||'').trim()).filter(Boolean);
  if (!addresses.length) { alert(t('errNoAddress')); return; }
  const btn=document.getElementById('excelSearchBtn'), wrap=document.getElementById('excelProgressWrap'),
        fill=document.getElementById('excelProgressFill'), lbl=document.getElementById('excelProgressLabel');
  btn.disabled=true; wrap.style.display='block'; lbl.style.display='block';
  document.getElementById('excelResults').style.display='none';
  const { results, authError } = await batchLookup(addresses, apiKey, (i,total) => {
    fill.style.width=`${Math.round(i/total*100)}%`; lbl.textContent=t('progressText',i,total);
  });
  btn.disabled=false; wrap.style.display='none'; lbl.style.display='none';
  if (authError) alert(t('errInvalidKey'));
  excelRows = dataRows.map((row,i) => ({ rowData: row, ...results[i] }));
  renderExcelResults(excelRows, hasH ? workbookData[0] : null);
}

function renderExcelResults(rows, headerRow) {
  const thead=document.getElementById('excelResultHead'), tbody=document.getElementById('excelResultBody');
  const cc = rows[0]?.rowData?.length||0;
  let hHtml='<tr>';
  if (headerRow) headerRow.forEach(h => { hHtml+=`<th>${esc(String(h))}</th>`; });
  else for(let i=0;i<cc;i++) hHtml+=`<th>${colLetter(i)}</th>`;
  hHtml+=`<th style="color:var(--red)">★ ${t('colZipResult')}</th><th>${t('colNormalized')}</th><th>${t('colType')}</th></tr>`;
  thead.innerHTML=hHtml;
  tbody.innerHTML='';
  rows.forEach(r => {
    let tr='<tr>';
    r.rowData.forEach(cell => { tr+=`<td>${esc(String(cell))}</td>`; });
    tr+=`<td>${r.zip?`<span class="zip-found">${r.zip}</span>`:`<span class="zip-error">${t('errNotFound')}</span>`}</td>`;
    tr+=`<td>${r.display?esc(r.display):'—'}</td><td>${typeBadge(r.type)}</td></tr>`;
    tbody.innerHTML+=tr;
  });
  const found=rows.filter(r=>r.zip).length;
  document.getElementById('excelSummary').textContent=t('summaryFound',found,rows.length);
  document.getElementById('excelResults').style.display='block';
}

function downloadOriginal() {
  if (!uploadedFile) return;
  const url=URL.createObjectURL(uploadedFile), a=document.createElement('a');
  a.href=url; a.download=uploadedFile.name; a.click(); URL.revokeObjectURL(url);
}

function downloadExcelResult() {
  if (!excelRows.length) return;
  const hasH=parseInt(document.getElementById('headerRowSelect').value)>0;
  const ws_data=[];
  if (hasH && workbookData[0]) ws_data.push([...workbookData[0], t('colZipResult'), t('colNormalized'), t('colType')]);
  excelRows.forEach(r => ws_data.push([...r.rowData, r.zip||'', r.display||'', typeLabel(r.type)]));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ws_data), '우편번호_결과');
  XLSX.writeFile(wb, `${(uploadedFile?.name.replace(/\.[^.]+$/,'')||'result')}_우편번호.xlsx`);
}

function showUploadError(msg) { const el=document.getElementById('uploadError'); el.textContent=msg; el.style.display='block'; }

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function typeBadge(t2) {
  return t2==='road'?`<span class="badge badge-road">${t('typeRoad')}</span>`:
         t2==='jibun'?`<span class="badge badge-jibun">${t('typeJibun')}</span>`:
         `<span class="badge badge-error">${t('typeError')}</span>`;
}
function typeLabel(t2) { return t2==='road'?t('typeRoad'):t2==='jibun'?t('typeJibun'):t('typeError'); }
function colLetter(i) { let s=''; i++; while(i>0){s=String.fromCharCode(64+(i%26||26))+s; i=Math.floor((i-1)/26);} return s; }
function formatBytes(b) { return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'; }

  if (k) document.getElementById('apiKey').value = k;
  document.getElementById('apiKey').addEventListener('input', e => localStorage.setItem('kakao_api_key', e.target.value.trim()));
  setLang(localStorage.getItem('lang') || 'vi');
})();
</script>
